<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JiffyKart Admin Dashboard</title>
  <link rel="icon" type="image/x-icon" href="/img1.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: '#505081',
            secondary: '#10B981',
            dark: '#0F0E47',
            light: '#F3F4F6',
            accent: '#8686AC',
            indigo: {
              50: '#F5F5FA',
              100: '#EDEDF6',
              200: '#DADAED',
              300: '#C7C7E4',
              400: '#8686AC',
              500: '#6B6BA6',
              600: '#505081',
              700: '#272757',
              800: '#1B1B3D',
              900: '#0F0E47',
              950: '#080824',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F3F4F6;
      color: #111827;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94A3B8;
    }

    button {
      cursor: pointer;
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
