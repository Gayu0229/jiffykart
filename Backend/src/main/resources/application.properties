# ===============================
# Application
# ===============================
spring.application.name=backend
spring.thymeleaf.cache=true

# Auto-activate local profile if not set externally
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ===============================
# PostgreSQL DB
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# HikariCP Connection Pool
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===============================
# Flyway
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.check-location=true
spring.flyway.repair-on-migrate=true

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# Multipart Uploads
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1

# ===============================
# Logging (Production)
# ===============================
logging.level.root=WARN
logging.level.com.jiffikart.backend=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# ===============================
# Mail (Zoho)
# ===============================
spring.mail.host=smtp.zoho.in
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.zoho.in

# ===============================
# Twilio
# ===============================
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}
twilio.verify-service-sid=${TWILIO_VERIFY_SERVICE_SID}

# ===============================
# PhonePe
# ===============================
phonepe.merchant-id=${PHONEPE_MERCHANT_ID}
phonepe.salt-key=${PHONEPE_SALT_KEY}
phonepe.salt-index=${PHONEPE_SALT_INDEX}
phonepe.client-id=${PHONEPE_CLIENT_ID}
phonepe.client-secret=${PHONEPE_CLIENT_SECRET}
phonepe.client-version=${PHONEPE_CLIENT_VERSION}
phonepe.token-url=${PHONEPE_TOKEN_URL}
phonepe.api-url=${PHONEPE_API_URL}
phonepe.status-url=${PHONEPE_STATUS_URL}
phonepe.redirect-url=${PHONEPE_REDIRECT_URL}
phonepe.callback-url=${PHONEPE_CALLBACK_URL}

# ===============================
# Gemini AI
# ===============================
gemini.api.key=${GEMINI_API_KEY}

# ===============================
# UPI
# ===============================
jiffikart.upi.id=${UPI_ID}

